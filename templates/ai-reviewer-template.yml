parameters:
  - name: llmEndpoint
    type: string
  - name: llmModel
    type: string
    default: 'gpt-4o'
  - name: systemPromptPath
    type: string
    default: 'config/system_prompt.md'
  - name: rulesFilePath
    type: string
    default: 'config/general-csharp-rules.md'
  - name: fileExclusions
    type: string
    default: '*.designer.cs, *.min.js, package-lock.json, *.dll, *.exe, *.pdb'
  - name: temperature
    type: number
    default: 0.0

steps:
  - task: PowerShell@2
    displayName: '1. AI Code Review (Fail Fast)'
    inputs:
      filePath: '$(System.DefaultWorkingDirectory)/scripts/AiCodeReviewer.ps1'
      arguments: >
        -LlmEndpoint "${{ parameters.llmEndpoint }}"
        -Model "${{ parameters.llmModel }}"
        -SystemPromptPath "${{ parameters.systemPromptPath }}"
        -RulesFilePath "${{ parameters.rulesFilePath }}"
        -FileExclusions "${{ parameters.fileExclusions }}"
        -Temperature ${{ parameters.temperature }}
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      LLM_API_KEY: $(LlmApiKeySecret) # Ensure you map this secret variable in your pipeline
